<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Krypton Uploader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="ambient-blur"></div>
  <div class="grain"></div>
  <div class="cursor-glow" id="cursor-glow"></div>

  <div class="container">

    <header class="reveal" style="--d:0">
      <p class="wordmark">Krypton</p>
      <h1>No More Compression<br>On TikTok</h1>
    </header>

    <div class="glass-panel upload-zone reveal tilt" id="drop-zone" style="--d:1">
      <div id="upload-content">
        <div class="upload-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <h3>Drag & drop your video</h3>
        <p>or</p>
        <button class="btn-pill btn-primary tilt" id="browse-btn" data-sfx="click"><span>Browse Files</span></button>
        <input type="file" id="file-input" accept="video/mp4,video/x-m4v,video/*" hidden>
      </div>

      <div id="processing-state" class="hidden">
        <div class="spinner"></div>
        <h3 id="status-text">Initializing...</h3>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div id="success-state" class="hidden">
        <div class="success-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><path class="success-circle" d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline class="success-check" points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h3>Processing complete</h3>
        <button class="btn-pill btn-primary tilt" id="download-btn" data-sfx="click"><span>Download Video</span></button>
      </div>
    </div>

    <div class="divider reveal" style="--d:2"><span>Community</span></div>

    <div class="nav-buttons reveal" style="--d:3">
      <a href="https://tiktok.com/@_kryptonaep" target="_blank" class="btn-pill btn-glass tilt" data-sfx="hover">
        <span>TikTok</span>
      </a>
      <a href="https://discord.gg/9Wf9CVXWmr" target="_blank" class="btn-pill btn-glass tilt" data-sfx="hover">
        <span>Discord</span>
      </a>
    </div>

    <div class="glass-panel promo-panel reveal tilt" style="--d:4">
      <div class="promo-content">
        <h3>Start earning on TikTok</h3>
        <p>Join the community and learn how to monetize your content.</p>
      </div>
      <a href="https://discord.gg/FHYzQmgZqE" target="_blank" class="btn-pill btn-secondary tilt" data-sfx="click">Join Now</a>
    </div>

  </div>

  <script src="ffmpeg/ffmpeg.js"></script>
  <script src="mp4-container-patcher.js"></script>
  <script src="sfx.js"></script>
  <script src="interactions.js"></script>
  <script src="popup.js"></script>
</body>
</html>
